    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body { background-color: #131314; color: #e3e3e3; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
        
        .prose { max-width: 100%; word-break: break-word; overflow-wrap: break-word; }
        .prose pre { background-color: #1e1e20; border-radius: 12px; padding: 1.25rem; overflow-x: auto; border: 1px solid #333; margin: 1.25rem 0; position: relative; max-width: 100%; }
        .prose code { color: #f87171; background-color: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 0.85em; font-family: 'Fira Code', monospace; }
        .prose a { color: #8ab4f8; text-decoration: underline; text-underline-offset: 4px; transition: color 0.2s; }
        .prose h1, .prose h2, .prose h3 { color: #fff; margin-top: 1.75rem; margin-bottom: 0.75rem; font-weight: 600; line-height: 1.4; }
        .prose h1 { font-size: 1.6em; }
        .prose h2 { font-size: 1.4em; }
        .prose h3 { font-size: 1.2em; }
        .prose p, .prose ul, .prose ol { margin-bottom: 1.25rem; line-height: 1.8; }
        .prose li { margin-bottom: 0.5rem; }
        .prose img { max-width: 100%; border-radius: 0.75rem; height: auto; margin: 1rem 0; }

        .typing-indicator span { animation: blink 1.4s infinite both; height: 5px; width: 5px; background-color: #888; border-radius: 50%; display: inline-block; margin: 0 2px; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        .active-session { background-color: #33353a; color: white; border-left: 4px solid #8ab4f8; }
        .pinned-icon { transform: rotate(-45deg); color: #8ab4f8; }

        @keyframes pulse-ring { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .recording-pulse { animation: pulse-ring 2s infinite; background-color: rgba(239, 68, 68, 0.15); border-radius: 50%; color: #ef4444 !important; }
        
        .edit-container textarea { width: 100%; background-color: #2a2b2f; color: white; padding: 1rem; border-radius: 1rem; border: 1px solid #444; outline: none; transition: border-color 0.2s; font-size: 1rem; line-height: 1.6; }
        .edit-container textarea:focus { border-color: #3b82f6; }
    </style>
</head>

    <script>
        // 🚨 【極度重要】請將下方網址替換為您 Google Apps Script 部署出來的「網頁應用程式網址」！
        // 如果沒有替換，或者您的 GAS 部署權限沒有設定為「所有人 (Anyone)」，就會出現 Failed to fetch 錯誤。
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwsng4RBCTX67my46U4fv7BhDYT0CIZt95dL7DNCFJTGUJLZFd_854vRGeUsQ1_BjG9/exec";

        // Marked.js 設定 (相容 GAS)
        marked.use({
            renderer: {
                link: function(hrefOrToken, title, text) {
                    let h = hrefOrToken.href || hrefOrToken;
                    let t = hrefOrToken.title || title;
                    let txt = hrefOrToken.text || text;
                    return `<a href="${h}" ${t ? `title="${t}"` : ''} target="_blank" rel="noopener noreferrer" class="text-blue-400 underline">${txt}</a>`;
                }
            }
        });

        // 全域變數
        let currentSessionId = generateUUID();
        let currentImageData = null;
        let currentMimeType = null;
        let currentDocumentText = null;
        let currentDocumentName = null;
        let currentYouTubeId = null;
        let isWaiting = false;
        let currentRenderCode = "";
        let abortController = null;
        let silenceTimer = null;
        let currentGemsList = []; 

        // DOM 元素
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sendBtnIcon = sendBtn.querySelector('.material-symbols-rounded');

        // 輸入框自動調整高度
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight > 240 ? 240 : this.scrollHeight) + 'px';
        });

        // 功能選單切換
        function toggleSettingsMenu() {
            const dropdown = document.getElementById('settings-dropdown');
            const chevron = document.getElementById('settings-menu-chevron');
            dropdown.classList.toggle('hidden');
            chevron.style.transform = dropdown.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
        }

        document.addEventListener('click', (e) => {
            const btn = document.getElementById('settings-menu-btn');
            const dropdown = document.getElementById('settings-dropdown');
            if (btn && dropdown && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.add('hidden');
                document.getElementById('settings-menu-chevron').style.transform = 'rotate(0deg)';
            }
        });

        // 語音辨識 (Speech-to-Text)
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'cmn-Hant-TW'; 
            
            recognition.onstart = function() {
                isRecording = true;
                document.getElementById('mic-btn').classList.add('recording-pulse', 'text-white');
                if (window.speechSynthesis) window.speechSynthesis.cancel();
            };
            
            recognition.onresult = function(event) {
                if (!isRecording) return;
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                userInput.value = finalTranscript + interim;
                userInput.dispatchEvent(new Event('input'));
                
                if (document.getElementById('continuous-mode-toggle').checked) {
                    clearTimeout(silenceTimer);
                    silenceTimer = setTimeout(() => {
                        if (isRecording && userInput.value.trim() !== '') {
                            stopRecording();
                            sendMessage();
                        }
                    }, 1500);
                }
            };
            recognition.onerror = () => stopRecording();
            recognition.onend = () => stopRecording();
        }
        
        function startRecording() {
            if (!recognition) return;
            if (!isRecording) {
                isRecording = true;
                finalTranscript = userInput.value;
                try { recognition.start(); } catch(e) { isRecording = false; }
            }
        }
        
        function toggleRecording() {
            if (!recognition) { alert('您的瀏覽器不支援語音辨識。'); return; }
            isRecording ? stopRecording() : startRecording();
        }
        
        function stopRecording() {
            isRecording = false;
            clearTimeout(silenceTimer);
            document.getElementById('mic-btn').classList.remove('recording-pulse', 'text-white');
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
        }

        // 語音播報 (Text-to-Speech)
        function speakText(text, isAutoPlay = false) {
            if (isAutoPlay && !document.getElementById('voice-output-toggle').checked) return false;
            if (!window.speechSynthesis) return false;
            window.speechSynthesis.cancel(); 
            
            // 清理 Markdown 標記，避免唸出奇怪的符號
            let cleanText = text
                .replace(/```[\s\S]*?```/g, '')
                .replace(/https?:\/\/[^\s]+/g, '網址')
                .replace(/[*_#`~|]/g, '')
                .trim();
                
            if (!cleanText) return false;
            
            let utterance = new SpeechSynthesisUtterance(cleanText);
            const voices = window.speechSynthesis.getVoices();
            
            if (/[\u4e00-\u9fa5]/.test(cleanText)) { 
                utterance.lang = 'zh-TW';
                utterance.rate = 1.0;
                utterance.voice = voices.find(v => v.lang.includes('zh-TW')) || voices.find(v => v.name.includes('Yating')) || null;
            } else { 
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                utterance.voice = voices.find(v => v.lang.includes('en-US')) || null;
            }
            
            if (isAutoPlay) {
                utterance.onend = () => {
                    if (document.getElementById('continuous-mode-toggle').checked && !isWaiting) {
                        setTimeout(startRecording, 400);
                    }
                };
            }
            window.speechSynthesis.speak(utterance);
            return true;
        }

            return new Promise((r, j) => {
                let s = document.createElement('script');
                s.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
                s.onload = () => {
                    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                    pdfjsLibLoaded = true;
                    r();
                };
                s.onerror = j;
                document.head.appendChild(s);
            });
        }

                s.onload = () => { mammothLoaded = true; r(); };

        // 核心 API 請求函數 (已移除 headers 避免 CORS Preflight 阻擋)
        async function fetchFromGAS(payload) {
            if (GAS_URL.includes("===請替換為您的GAS_URL===")) {
                alert("⚠️ 嚴重錯誤：您尚未設定 GAS_URL！\n請在 HTML 程式碼第 216 行填入您部署的網址。");
                throw new Error("GAS_URL 未設定");
            }
            
            try {
                const res = await fetch(GAS_URL, { 
                    method: 'POST', 
                    // 故意不設定 headers，強制讓瀏覽器以 text/plain 的 Simple Request 送出
                    body: JSON.stringify(payload),
                    signal: abortController ? abortController.signal : undefined 
                });
                
                if (!res.ok) throw new Error(`HTTP Error: ${res.status}`);
                return await res.json();
                
            } catch (err) {
                console.error("Fetch 連線失敗:", err);
                // 只有在發送訊息時才顯示大橫幅，背景載入(選單)失敗時不打擾使用者
                if (payload.action !== 'get_models' && payload.action !== 'get_gems' && payload.action !== 'get_session_list') {
                    showConnectionError();
                }
                throw err;
            }
        }

        // 發送訊息
        async function sendMessage() {
            clearTimeout(silenceTimer);
            stopRecording(); 
            
            const text = userInput.value.trim();
            if (!text && !currentImageData && !currentDocumentText && !currentYouTubeId) return;
            if (isWaiting) return;
            if (window.speechSynthesis) window.speechSynthesis.cancel(); 

            let gemPrompt = null, gemModel = null;
            const gs = document.getElementById('gem-selector');
            const ms = document.getElementById('model-selector');
            
            if (gs.value !== "") {
                gemPrompt = currentGemsList[parseInt(gs.value)].prompt;
                gemModel = currentGemsList[parseInt(gs.value)].model;
            }

            let displayMsg = text;
            if (currentDocumentName) displayMsg = `📎 [文件: ${currentDocumentName}]\n${text}`;
            if (currentYouTubeId) displayMsg = `📺 [YouTube 影片]\n${text}`;
            if (gemPrompt && !currentDocumentName && !currentYouTubeId) displayMsg = `【角色：${currentGemsList[parseInt(gs.value)].name}】\n${text}`;

            appendMessage('user', displayMsg, currentImageData);
            
            // 幻覺防護：使用明確的 XML 標籤包裝上傳的文字
            let finalPrompt = text || "請詳細分析這份檔案的內容並給出摘要。";
            if (currentDocumentText) {
                finalPrompt = `【系統攔截：使用者已在前端上傳了檔案，以下是系統自動萃取的純文字內容。請直接閱讀以下內容，絕對不要去 Google 雲端硬碟搜尋此檔案！】\n📄 檔案名稱：${currentDocumentName}\n<file_content>\n${currentDocumentText}\n</file_content>\n\n🗣️ 使用者指令：${finalPrompt}`;
            } else if (currentYouTubeId) {
                finalPrompt = `【YouTube 影片】：https://www.youtube.com/watch?v=${currentYouTubeId}\n\n使用者指令：${finalPrompt}`;
            }

            userInput.value = '';
            userInput.style.height = 'auto';
            finalTranscript = ''; 
            
            const payload = { 
                message: finalPrompt,
                session_id: currentSessionId, 
                file_data: currentImageData ? currentImageData.split(',')[1] : null,
                mime_type: currentMimeType, 
                web_search: document.getElementById('web-search-toggle').checked, 
                auto_image: document.getElementById('auto-image-toggle').checked, 
                draw_mode: document.getElementById('draw-mode-toggle').checked, 
                youtube_id: currentYouTubeId,
                gem_prompt: gemPrompt,
                gem_model: gemModel,
                selected_model: ms.value 
            };
            
            clearUpload();
            toggleSendButton(true);
            const loadingId = appendLoading();
            abortController = new AbortController(); 

            try {
                const data = await fetchFromGAS(payload);
                removeLoading(loadingId);
                
                if (data.status === "error") throw new Error(data.error || "伺服器錯誤");
                
                if (data.reply) {
                    appendMessage('ai', data.reply, data.image ? `data:${data.mime};base64,${data.image}` : null, data.model);
                    speakText(data.reply, true);
                }
                loadSessions(); 
            } catch (err) {
                removeLoading(loadingId);
                if (err.name === 'AbortError') {
                    appendMessage('ai', `🛑 **生成已手動中止。**`);
                } else {
                    appendMessage('ai', `❌ 執行失敗：\n\`\`\`text\n${err.message}\n\`\`\``);
                }
            } finally {
                toggleSendButton(false);
                abortController = null;
            }
        }

        // 檔案上傳與前端解析器 (榨汁機)
        async function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (file.type.startsWith('image/')) {
                reader.onload = (ev) => {
                    currentImageData = ev.target.result;
                    currentMimeType = file.type;
                    document.getElementById('image-preview').src = currentImageData;
                    document.getElementById('image-preview').classList.remove('hidden');
                    document.getElementById('upload-preview-container').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            } 
            else if (file.type === 'application/pdf' || ext === 'pdf') {
                const lid = appendLoading();
                try {
                    await loadPdfJs();
                    reader.onload = async (ev) => {
                        try {
                            const pdf = await pdfjsLib.getDocument(new Uint8Array(ev.target.result)).promise;
                            let t = "";
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                t += content.items.map(s => s.str).join(' ') + "\n";
                            }
                            setDocPayload(file.name, t);
                        } catch (err) { alert("PDF 解析失敗"); }
                        finally { removeLoading(lid); }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) { removeLoading(lid); }
            } 
            else if (ext === 'docx') {
                const lid = appendLoading();
                try {
                    await loadMammoth();
                    reader.onload = async (ev) => {
                        try {
                            const result = await mammoth.extractRawText({ arrayBuffer: ev.target.result });
                            setDocPayload(file.name, result.value);
                        } catch(err) { alert("Word 解析失敗"); }
                        finally { removeLoading(lid); }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) { removeLoading(lid); }
            } 
            else if (ext === 'xlsx' || ext === 'csv') {
                const lid = appendLoading();
                try {
                    await loadXlsx();
                    reader.onload = (ev) => {
                        try {
                            const wb = XLSX.read(ev.target.result, { type: 'array' });
                            let t = "";
                            wb.SheetNames.forEach(n => {
                                t += `\n--- 表單: ${n} ---\n`;
                                t += XLSX.utils.sheet_to_csv(wb.Sheets[n]);
                            });
                            setDocPayload(file.name, t);
                        } catch(err) { alert("Excel 解析失敗"); }
                        finally { removeLoading(lid); }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) { removeLoading(lid); }
            } 
            else if (ext === 'pptx') {
                const lid = appendLoading();
                try {
                    await loadJszip();
                    reader.onload = async (ev) => {
                        try {
                            const zip = new JSZip();
                            const loadedZip = await zip.loadAsync(ev.target.result);
                            let t = `【投影片解析 ${file.name}】\n\n`;
                            
                            const sFiles = Object.keys(loadedZip.files)
                                .filter(n => n.match(/^ppt\/slides\/slide\d+\.xml$/))
                                .sort((a,b) => parseInt(a.match(/(\d+)\.xml$/)[1]) - parseInt(b.match(/(\d+)\.xml$/)[1]));
                                
                            const nFiles = Object.keys(loadedZip.files)
                                .filter(n => n.match(/^ppt\/notesSlides\/notesSlide\d+\.xml$/));
                                
                            const parser = new DOMParser();
                            
                            for (const p of sFiles) {
                                const sn = p.match(/(\d+)\.xml$/)[1];
                                t += `--- 第 ${sn} 頁 ---\n`;
                                
                                const sx = await loadedZip.file(p).async("string");
                                if (sx) {
                                    const textNodes = parser.parseFromString(sx, "text/xml").getElementsByTagName("a:t");
                                    t += `[內容]:\n${Array.from(textNodes).map(n => n.textContent).join(" ").trim()}\n`;
                                }
                                
                                const np = `ppt/notesSlides/notesSlide${sn}.xml`;
                                if (nFiles.includes(np)) {
                                    const nx = await loadedZip.file(np).async("string");
                                    if (nx) {
                                        const noteNodes = parser.parseFromString(nx, "text/xml").getElementsByTagName("a:t");
                                        if (noteNodes.length) {
                                            t += `[講者備忘錄]:\n${Array.from(noteNodes).map(n => n.textContent).join(" ").trim()}\n`;
                                        }
                                    }
                                }
                                t += `\n`;
                            }
                            setDocPayload(file.name, t);
                        } catch (err) {
                            console.error(err);
                            alert("PPTX 解析失敗");
                        } finally {
                            removeLoading(lid);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } catch (err) { removeLoading(lid); }
            } 
            else {
                reader.onload = (ev) => setDocPayload(file.name, ev.target.result);
                reader.readAsText(file);
            }
        }
        
        function setDocPayload(n, t) {
            currentDocumentName = n;

            document.getElementById('doc-filename').innerText = n;
            document.getElementById('doc-preview').classList.remove('hidden');

            chatContainer.appendChild(w);

            // 預覽按鈕注入
            if (isAI) {
                w.querySelectorAll('pre code').forEach(c => {
                    if (c.className.includes('language-html') || c.className.includes('language-jsx') || c.className.includes('language-javascript')) {
                        let btn = document.createElement('button');
                        btn.className = "absolute top-2 sm:top-3 right-2 sm:right-3 bg-blue-600 hover:bg-blue-500 text-white text-[10px] sm:text-xs px-2 sm:px-3 py-1 sm:py-1.5 rounded-lg flex items-center gap-1 shadow-lg";
                        btn.innerHTML = '<span class="material-symbols-rounded text-[12px] sm:text-sm">play_circle</span> 預覽';
                        btn.onclick = () => openPreview(c.innerText);
                        c.parentElement.appendChild(btn);
                    }
                });
            }
            
            // 事件綁定
            if (isAI && text) {
                w.querySelector('.copy-btn').onclick = () => navigator.clipboard.writeText(text).then(() => {
                    let ic = w.querySelector('.copy-btn span');
                    ic.innerText = 'check';
                    setTimeout(() => ic.innerText = 'content_copy', 2000);
                });
                w.querySelector('.speak-btn').onclick = () => speakText(text, false);
            }
            
            if (!isAI && text) {
                w.querySelector('.edit-btn').onclick = () => {
                    const contentDiv = w.querySelector('.prose');
                    const actionsDiv = w.querySelector('.flex.items-center.gap-2.mt-2');
                    contentDiv.classList.add('hidden');
                    actionsDiv.classList.add('hidden');
                    
                    const editContainer = document.createElement('div');
                    editContainer.className = "edit-container w-full mt-2 flex flex-col gap-2 text-left";
                    
                    let cleanText = text.replace(/^【角色：.*?】\n/, '').replace(/^📎 \[文件: .*?\]\n/, '');
                    
                    editContainer.innerHTML = `
                        <textarea rows="4">${cleanText}</textarea>
                        <div class="flex justify-end gap-2 mt-2">
                            <button class="cancel-edit-btn text-gray-400 text-sm px-3 py-1">取消</button>
                            <button class="save-edit-btn bg-blue-600 hover:bg-blue-500 text-white text-sm px-3 py-1 rounded-lg shadow-md transition-colors">重新生成</button>
                        </div>
                    `;
                    w.querySelector('.flex-1').appendChild(editContainer);
                    
                    editContainer.querySelector('.cancel-edit-btn').onclick = () => {
                        editContainer.remove();
                        contentDiv.classList.remove('hidden');
                        actionsDiv.classList.remove('hidden');
                    };
                    
                    editContainer.querySelector('.save-edit-btn').onclick = () => {
                        const newText = editContainer.querySelector('textarea').value.trim();
                        if (!newText) return;
                        
                        let curr = w;
                        while(curr) {
                            let next = curr.nextElementSibling;
                            curr.remove();
                            curr = next;
                        }
                        sendEditAndRegenerate(text, newText);
                    };
                };
            }
            
            if (w.querySelector('.delete-btn')) {
                w.querySelector('.delete-btn').onclick = () => {
                    if (confirm("刪除此訊息後系統將忘記這段對話，確定嗎？")) {
                        w.remove();
                        fetchFromGAS({
                            mode: 'system',
                            action: 'delete_message',
                            session_id: currentSessionId,
                            target_text: text,
                            target_role: role
                        });
                    }
                };
            }
            scrollToBottom();
        }

        // 載入與工具
        function appendLoading() {
            const id = 'loader-' + Date.now();
            const d = document.createElement('div');
            d.id = id;
            d.className = "flex gap-3 sm:gap-4 max-w-4xl mx-auto w-full";
            d.innerHTML = `<div class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-blue-600 flex items-center justify-center shrink-0 animate-pulse"><span class="material-symbols-rounded text-white text-[18px] sm:text-xl">hourglass_empty</span></div><div class="pt-1.5 sm:pt-3 flex gap-2 items-center text-gray-500 text-sm sm:text-base italic typing-indicator">代理人正忙碌中<span></span><span></span><span></span></div>`;
            chatContainer.appendChild(d);
            scrollToBottom();
            return id;
        }
        function removeLoading(id) { const el = document.getElementById(id); if (el) el.remove(); }
        function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }
        function generateUUID() { return 'xxxx-4xxx-yxxx'.replace(/[xy]/g, c => (c==='x'?(Math.random()*16|0):(Math.random()*16|0&0x3|0x8)).toString(16)); }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.toggle('hidden');
        }
        
        function startNewSession() {
            currentSessionId = generateUUID();
            chatContainer.innerHTML = '';
            appendMessage('ai', "您好！已為您開啟新的對話。\n您可以透過下方的「💎 角色選單」切換人格，或使用「🧠 模型選單」切換智商大腦！");
            if (window.innerWidth < 768) toggleSidebar();
            loadSessions();
        }
        
        async function switchSession(id, title) {
            if (id === currentSessionId && chatContainer.children.length > 1) return;
            currentSessionId = id;
            document.getElementById('mobile-title').innerText = title;
            chatContainer.innerHTML = '';
            const lid = appendLoading();
            if (window.innerWidth < 768) toggleSidebar();
            try {
                const data = await fetchFromGAS({ mode: 'system', action: 'load_session', session_id: id });
                removeLoading(lid);
                if (Array.isArray(data.logs)) {
                    data.logs.forEach(l => appendMessage(l.role === 'ai' ? 'ai' : 'user', l.text));
                }
                loadSessions();
            } catch (e) {
                removeLoading(lid);
            }
        }
        
        async function loadGems() {
            try {
                const data = await fetchFromGAS({ mode: 'system', action: 'get_gems' });
                if (data && data.gems) {
                    currentGemsList = data.gems;
                    const s = document.getElementById('gem-selector');
                    s.innerHTML = '<option value="">🤖 全能助理</option>';
                    currentGemsList.forEach((g, i) => {
                        const opt = document.createElement('option');
                        opt.value = i;
                        opt.text = `💎 ${g.name}`;
                        s.appendChild(opt);
                    });
                }
            } catch (e) {}
        }
        
        async function loadModels() {
            const backupModels = [
                { name: "⚡ 閃電 (2.5 Flash)", id: "gemini-2.5-flash" },
                { name: "🧠 專家 (2.5 Pro)", id: "gemini-2.5-pro" },
                { name: "💡 實驗 (2.0 Pro Exp)", id: "gemini-2.0-pro-exp-02-05" }
            ];
            const s = document.getElementById('model-selector');
            s.innerHTML = '<option value="">🧠 預設模型 (自動)</option>';
            try {
                const data = await fetchFromGAS({ mode: 'system', action: 'get_models' });
                if (data && data.models && data.models.length > 0) {
                    data.models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.id;
                        opt.text = m.name;
                        s.appendChild(opt);
                    });
                } else {
                    backupModels.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m.id; opt.text = m.name; s.appendChild(opt);
                    });
                }
            } catch (e) {
                backupModels.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id; opt.text = m.name; s.appendChild(opt);
                });
            }
        }

        async function loadSessions() {
            try {
                const data = await fetchFromGAS({ mode: 'system', action: 'get_session_list' });
                const list = document.getElementById('session-list');
                list.innerHTML = '';
                if (Array.isArray(data.sessions)) {
                    data.sessions.forEach(s => {
                        const act = s.id === currentSessionId;
                        const pin = s.pinned;
                        const item = document.createElement('div');
                        item.className = `group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all ${act ? 'active-session' : 'text-gray-400 hover:bg-[#2a2b2f] hover:text-white'}`;
                        item.innerHTML = `
                            <div class="flex items-center gap-3 truncate flex-1 min-w-0">
                                <span class="material-symbols-rounded text-lg shrink-0 ${pin ? 'pinned-icon' : ''}">${pin ? 'push_pin' : (act ? 'chat_bubble' : 'chat')}</span>
                                <span class="truncate text-sm font-medium tracking-wide">${s.title}</span>
                            </div>
                            <div class="flex items-center gap-1 opacity-100 md:opacity-0 md:group-hover:opacity-100 shrink-0 ml-2 transition-opacity">
                                <button class="p-1 pin-btn ${pin ? 'text-blue-500' : ''} hover:bg-[#333] rounded-md transition-colors"><span class="material-symbols-rounded text-[16px]">push_pin</span></button>
                                <button class="p-1 edit-btn hover:text-blue-400 hover:bg-[#333] rounded-md transition-colors"><span class="material-symbols-rounded text-[16px]">edit</span></button>
                                <button class="p-1 del-btn hover:text-red-400 hover:bg-[#333] rounded-md transition-colors"><span class="material-symbols-rounded text-[16px]">delete</span></button>
                            </div>
                        `;
                        item.onclick = () => switchSession(s.id, s.title);
                        item.querySelector('.pin-btn').onclick = (e) => { e.stopPropagation(); fetchFromGAS({ mode: 'system', action: 'pin_session', session_id: s.id, is_pinned: !pin }).then(loadSessions); };
                        item.querySelector('.edit-btn').onclick = (e) => { e.stopPropagation(); const n = prompt("重命名：", s.title); if (n && n.trim()) fetchFromGAS({ mode: 'system', action: 'rename_session', session_id: s.id, new_title: n }).then(loadSessions); };
                        item.querySelector('.del-btn').onclick = (e) => { e.stopPropagation(); if (confirm("確定要刪除嗎？")) fetchFromGAS({ mode: 'system', action: 'delete_session', session_id: s.id }).then(() => s.id === currentSessionId ? startNewSession() : loadSessions()); };
                        list.appendChild(item);
                    });
                }
            } catch (e) {}
        }

        // 預覽功能
        function openPreview(code) {
            let rc = code;
            if ((code.includes('export default') || code.includes('import React') || code.includes('className=')) && !(code.trim().toLowerCase().startsWith('<!doctype html') || code.trim().toLowerCase().startsWith('<html'))) {
                let cc = code.replace(/import\s+.*?from\s+['"].*?['"];?/g, '').replace(/export\s+default\s+function/g, 'function');
                let cm = code.match(/export\s+default\s+function\s+([A-Za-z0-9_]+)/);
                rc = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://unpkg.com/react@18/umd/react.production.min.js"><\/script><script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"><\/script><script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script><script src="https://cdn.tailwindcss.com"><\/script><script src="https://unpkg.com/lucide@latest"><\/script></head><body class="bg-gray-50"><div id="root"></div><script type="text/babel">const { useState, useEffect, useRef, useMemo, useCallback } = React; try { ${cc} const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<${cm ? cm[1] : 'App'} />); setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 100); } catch(err) { document.getElementById('root').innerHTML = '<div class="p-4 text-red-700">渲染錯誤:<br>' + err.message + '</div>'; } <\/script></body></html>`;
            }
            currentRenderCode = rc;
            document.getElementById('preview-modal').classList.remove('hidden');
            document.getElementById('preview-modal').classList.add('flex');
            document.getElementById('preview-iframe').srcdoc = rc;
        }
        
        function closePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-modal').classList.remove('flex');
            document.getElementById('preview-iframe').srcdoc = '';
        }
        
        function refreshPreview() {
            if (currentRenderCode) document.getElementById('preview-iframe').srcdoc = currentRenderCode;
        }

        window.onload = () => { 
            // 延遲一點點載入避免初次渲染卡頓
            setTimeout(() => {
                loadSessions(); 
                loadGems(); 
                loadModels();
            }, 100);
        };
    </script>
</body>
</html>
