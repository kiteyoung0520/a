<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>anyGem - Super Agent (Ultimate Edition)</title>
    
    <link rel="preconnect" href="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)">
    <link rel="preconnect" href="[https://cdn.jsdelivr.net](https://cdn.jsdelivr.net)">
    <link rel="preconnect" href="[https://cdnjs.cloudflare.com](https://cdnjs.cloudflare.com)">

    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <script src="[https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js](https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js)"></script>
    <link rel="stylesheet" href="[https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0](https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0)" />
    
    <!-- 載入外部樣式表 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="h-screen flex overflow-hidden">

    <!-- Artifacts Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-md flex-col">
        <div class="h-14 bg-[#1e1f22] border-b border-[#333] flex items-center justify-between px-4 sm:px-6">
            <div class="flex items-center gap-2 sm:gap-3">
                <span class="material-symbols-rounded text-blue-400">deployed_code</span>
                <span class="font-semibold text-xs sm:text-sm tracking-wide text-white truncate">Artifact Preview</span>
            </div>
            <div class="flex items-center gap-2 sm:gap-4 shrink-0">
                <button onclick="refreshPreview()" class="p-2 text-gray-400 hover:text-white transition-colors"><span class="material-symbols-rounded">refresh</span></button>
                <button onclick="closePreview()" class="p-2 text-gray-400 hover:text-red-400 bg-[#333] hover:bg-red-500/10 rounded-full transition-all"><span class="material-symbols-rounded">close</span></button>
            </div>
        </div>
        <div class="flex-1 bg-white relative">
            <iframe id="preview-iframe" sandbox="allow-scripts allow-forms allow-modals" class="w-full h-full border-none absolute inset-0"></iframe>
        </div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-[#1e1f22] border-r border-[#333] flex flex-col transition-transform duration-300 z-30 absolute md:relative h-full -translate-x-full md:translate-x-0 w-[85vw] max-w-[340px] md:w-[288px] md:max-w-none shadow-2xl md:shadow-none" style="min-width: 200px;">
        <div id="sidebar-resizer" class="hidden md:block absolute top-0 right-0 w-1.5 h-full cursor-col-resize hover:bg-blue-500/50 z-40 transition-colors"></div>

        <div class="p-6">
            <div class="flex items-center gap-3 mb-8">
                <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center">
                    <span class="material-symbols-rounded text-white text-xl">auto_awesome</span>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">anyGem Agent</h1>
            </div>
            <button onclick="startNewSession()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold py-3 rounded-xl transition-all shadow-lg">
                <span class="material-symbols-rounded">add</span> 新對話
            </button>
        </div>
        <div id="session-list" class="flex-1 overflow-y-auto px-3 space-y-1 pb-4"></div>
        
        <div class="px-3 pb-4 border-t border-[#333] pt-4 shrink-0">
            <button onclick="toggleBookmarks()" class="w-full flex items-center justify-between px-3 mb-1 group cursor-pointer outline-none hover:bg-[#2a2b2f] p-2 rounded-lg transition-colors">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-rounded text-gray-500 text-[16px] group-hover:text-blue-400 transition-colors">bookmarks</span>
                    <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider group-hover:text-white transition-colors">外部工具 (Tools)</span>
                </div>
                <span id="bookmark-chevron" class="material-symbols-rounded text-gray-500 text-sm transition-transform duration-200">expand_more</span>
            </button>
            <div id="bookmark-list" class="space-y-1 hidden mt-2">
                <a href="[https://kiteyoung8.github.io/panter/](https://kiteyoung8.github.io/panter/)" target="_blank" class="flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:bg-[#2a2b2f] hover:text-white transition-all group">
                    <span class="material-symbols-rounded text-lg shrink-0 group-hover:text-pink-400 transition-colors">palette</span><span class="truncate text-sm">繪圖引擎</span>
                </a>
                <a href="[https://ppt-azure.vercel.app/](https://ppt-azure.vercel.app/)" target="_blank" class="flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:bg-[#2a2b2f] hover:text-white transition-all group">
                    <span class="material-symbols-rounded text-lg shrink-0 group-hover:text-blue-400 transition-colors">style</span><span class="truncate text-sm">智慧圖卡</span>
                </a>
                <a href="[https://kiteyoung0520.github.io/p/](https://kiteyoung0520.github.io/p/)" target="_blank" class="flex items-center gap-3 p-3 rounded-xl text-gray-400 hover:bg-[#2a2b2f] hover:text-white transition-all group">
                    <span class="material-symbols-rounded text-lg shrink-0 group-hover:text-amber-400 transition-colors">slideshow</span><span class="truncate text-sm">魔法簡報師</span>
                </a>
            </div>
        </div>
        <div class="p-4 border-t border-[#333] text-xs text-gray-500 text-center font-mono shrink-0">v86.40 Ultimate Edition</div>
    </aside>

    <!-- Main Chat Area -->
    <main class="flex-1 flex flex-col relative bg-[#131314] overflow-hidden w-full">
        <header class="h-14 flex items-center justify-between px-4 md:hidden border-b border-[#333] bg-[#1e1f22] shrink-0 z-20">
            <button onclick="toggleSidebar()" class="p-2 text-gray-400"><span class="material-symbols-rounded">menu</span></button>
            <span class="font-semibold text-sm truncate px-4" id="mobile-title">新對話</span>
            <div class="w-10"></div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto overflow-x-hidden px-4 py-6 md:px-12 space-y-6 pb-48 md:pb-40 w-full relative scroll-smooth">
            <div class="max-w-3xl mx-auto flex gap-4 sm:gap-6 w-full">
                <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center shadow-lg shrink-0"><span class="material-symbols-rounded text-white">smart_toy</span></div>
                <div class="flex-1">
                    <h2 class="text-2xl sm:text-3xl font-bold text-white mb-2">我是您的 anyGem 代理人</h2>
                    <p class="text-gray-400 text-base sm:text-lg leading-relaxed">您可以透過下方的「💎 角色選單」切換專長，或使用「🧠 模型選單」自由升降級我的智商大腦！</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-[#131314] via-[#131314] to-transparent pt-12 pb-4 sm:pb-8 px-2 sm:px-4 md:px-12 z-20 pointer-events-none">
            <div class="max-w-3xl mx-auto w-full pointer-events-auto">
                
                <!-- Upload Previews -->
                <div id="upload-preview-container" class="hidden flex gap-3 mb-3 px-2">
                    <div class="relative group">
                        <img id="image-preview" class="hidden h-16 w-16 sm:h-20 sm:w-20 object-cover rounded-xl border-2 border-blue-500/50 shadow-lg">
                        <div id="doc-preview" class="hidden flex items-center gap-2 sm:gap-3 bg-[#2a2b2f] p-3 sm:p-4 rounded-xl border border-[#444] shadow-lg">
                            <span class="material-symbols-rounded text-blue-400 text-xl sm:text-2xl">description</span>
                            <span id="doc-filename" class="text-xs sm:text-sm font-medium truncate max-w-[120px] sm:max-w-[150px]"></span>
                        </div>
                        <div id="youtube-preview" class="hidden flex items-center gap-2 sm:gap-3 bg-[#2a2b2f] p-2 pr-4 rounded-xl border border-[#444] shadow-lg">
                            <img id="yt-thumbnail" src="" class="h-10 w-16 sm:h-12 sm:w-20 object-cover rounded-lg border border-[#444]">
                            <div class="flex flex-col">
                                <span class="text-[10px] text-red-400 font-bold uppercase tracking-wider">YouTube</span>
                                <span class="text-xs sm:text-sm font-medium text-gray-200">影片連結已載入</span>
                            </div>
                        </div>
                        <button onclick="clearUpload()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-md"><span class="material-symbols-rounded text-[14px] block">close</span></button>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="bg-[#1e1f22] rounded-2xl border border-[#333] shadow-[0_-10px_40px_rgba(0,0,0,0.5)] focus-within:border-blue-500 transition-all p-1.5 sm:p-2 mx-1 sm:mx-0">
                    <div class="flex items-center flex-wrap gap-2 sm:gap-3 px-2 sm:px-3 mb-1 sm:mb-2 pt-1 border-b border-[#333] pb-1.5 sm:pb-2">
                        
                        <!-- Gems 角色選擇器 -->
                        <div class="relative flex items-center shrink-0">
                            <span class="absolute left-2 text-blue-400 material-symbols-rounded text-[14px] pointer-events-none">diamond</span>
                            <select id="gem-selector" class="pl-7 pr-6 py-1.5 bg-[#2a2b2f] hover:bg-[#333] text-blue-100 text-xs font-bold tracking-wide rounded-lg border border-[#444] outline-none focus:border-blue-500 transition-all appearance-none cursor-pointer max-w-[130px] sm:max-w-[160px] truncate shadow-sm">
                                <option value="">🤖 全能助理</option>
                            </select>
                            <span class="absolute right-1.5 text-gray-400 material-symbols-rounded text-[16px] pointer-events-none">arrow_drop_down</span>
                        </div>

                        <!-- ✨ 全域模型選擇器 -->
                        <div class="relative flex items-center mr-auto shrink-0">
                            <span class="absolute left-2 text-purple-400 material-symbols-rounded text-[14px] pointer-events-none">memory</span>
                            <select id="model-selector" class="pl-7 pr-6 py-1.5 bg-[#2a2b2f] hover:bg-[#333] text-purple-100 text-xs font-bold tracking-wide rounded-lg border border-[#444] outline-none focus:border-purple-500 transition-all appearance-none cursor-pointer max-w-[130px] sm:max-w-[160px] truncate shadow-sm">
                                <option value="">🧠 預設模型 (自動)</option>
                            </select>
                            <span class="absolute right-1.5 text-gray-400 material-symbols-rounded text-[16px] pointer-events-none">arrow_drop_down</span>
                        </div>

                        <!-- 收納式進階設定選單 -->
                        <div class="relative shrink-0">
                            <button type="button" id="settings-menu-btn" onclick="toggleSettingsMenu()" class="flex items-center gap-1.5 pl-2.5 pr-1.5 py-1.5 bg-[#2a2b2f] hover:bg-[#333] text-gray-300 text-xs font-bold tracking-wide rounded-lg border border-[#444] outline-none transition-all shadow-sm">
                                <span class="material-symbols-rounded text-[16px] text-gray-400">tune</span>
                                <span class="hidden sm:inline">功能</span>
                                <span id="settings-menu-chevron" class="material-symbols-rounded text-[18px] text-gray-500 transition-transform duration-200">expand_less</span>
                            </button>
                            
                            <!-- 下拉面板 -->
                            <div id="settings-dropdown" class="hidden absolute bottom-full right-0 mb-3 w-40 bg-[#2a2b2f] border border-[#444] rounded-xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] p-3 flex flex-col gap-4 z-50">
                                <label class="relative flex items-center justify-between cursor-pointer group">
                                    <span class="text-xs font-medium text-gray-300 group-hover:text-purple-400 transition-colors flex items-center gap-1.5"><span class="material-symbols-rounded text-[16px]">palette</span> 單純繪圖</span>
                                    <div class="relative"><input type="checkbox" id="draw-mode-toggle" class="sr-only peer"><div class="w-7 h-4 bg-gray-600 rounded-full peer peer-checked:bg-purple-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-full"></div></div>
                                </label>
                                <label class="relative flex items-center justify-between cursor-pointer group">
                                    <span class="text-xs font-medium text-gray-300 group-hover:text-blue-400 transition-colors flex items-center gap-1.5"><span class="material-symbols-rounded text-[16px]">language</span> 搜尋</span>
                                    <div class="relative"><input type="checkbox" id="web-search-toggle" class="sr-only peer"><div class="w-7 h-4 bg-gray-600 rounded-full peer peer-checked:bg-blue-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-full"></div></div>
                                </label>
                                <label class="relative flex items-center justify-between cursor-pointer group">
                                    <span class="text-xs font-medium text-gray-300 group-hover:text-pink-400 transition-colors flex items-center gap-1.5"><span class="material-symbols-rounded text-[16px]">imagesmode</span> 簡報配圖</span>
                                    <div class="relative"><input type="checkbox" id="auto-image-toggle" class="sr-only peer"><div class="w-7 h-4 bg-gray-600 rounded-full peer peer-checked:bg-pink-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-full"></div></div>
                                </label>
                                <label class="relative flex items-center justify-between cursor-pointer group">
                                    <span class="text-xs font-medium text-gray-300 group-hover:text-green-400 transition-colors flex items-center gap-1.5"><span class="material-symbols-rounded text-[16px]">volume_up</span> 播報</span>
                                    <div class="relative"><input type="checkbox" id="voice-output-toggle" class="sr-only peer"><div class="w-7 h-4 bg-gray-600 rounded-full peer peer-checked:bg-green-600 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-full"></div></div>
                                </label>
                                <label class="relative flex items-center justify-between cursor-pointer group">
                                    <span class="text-xs font-medium text-gray-300 group-hover:text-yellow-400 transition-colors flex items-center gap-1.5"><span class="material-symbols-rounded text-[16px]">all_inclusive</span> 連續</span>
                                    <div class="relative"><input type="checkbox" id="continuous-mode-toggle" class="sr-only peer"><div class="w-7 h-4 bg-gray-600 rounded-full peer peer-checked:bg-yellow-500 after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-full"></div></div>
                                </label>
                            </div>
                        </div>

                    </div>
                    
                    <div class="flex items-end gap-1 sm:gap-2 mt-1">
                        <button onclick="document.getElementById('file-upload').click()" class="p-2 sm:p-3 shrink-0 text-gray-400 hover:text-white rounded-xl transition-colors"><span class="material-symbols-rounded block">attach_file</span></button>
                        <input type="file" id="file-upload" class="hidden" onchange="handleFileUpload(event)" accept="image/*,application/pdf,text/*,.docx,.xlsx,.csv,.pptx">
                        
                        <button id="mic-btn" type="button" onclick="toggleRecording()" class="p-2 sm:p-3 shrink-0 text-gray-400 hover:text-white rounded-xl transition-all" title="點擊開始說話">
                            <span class="material-symbols-rounded block">mic</span>
                        </button>

                        <textarea id="user-input" rows="1" placeholder="輸入指令，或開啟「連續對話」直接說話..." class="w-full bg-transparent border-none outline-none text-gray-100 py-2.5 sm:py-3 px-1 sm:px-2 resize-none max-h-32 sm:max-h-60 text-base sm:text-lg leading-relaxed"></textarea>
                        
                        <button id="send-btn" class="p-2.5 sm:p-3 shrink-0 bg-white text-black rounded-xl hover:bg-gray-200 transition-all shadow-md flex items-center justify-center">
                            <span class="material-symbols-rounded block">send</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden" onclick="toggleSidebar()"></div>

    <!-- Matrix Protocol Modular Scripts (按照依賴順序載入) -->
    <script src="js/config.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/media.js"></script>
    <script src="js/parser.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
